<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGradient" x1="170" y1="512" x2="854" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF3B3B"/>
      <stop offset="18%" stop-color="#FF8A00"/>
      <stop offset="34%" stop-color="#FFD400"/>
      <stop offset="50%" stop-color="#7CFF00"/>
      <stop offset="66%" stop-color="#19D3C5"/>
      <stop offset="82%" stop-color="#1DA1F2"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>

    <linearGradient id="innerShade" x1="512" y1="210" x2="512" y2="814" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="35%" stop-color="white" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.20"/>
    </linearGradient>

    <filter id="softShadow" x="116" y="116" width="792" height="792" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <circle cx="512" cy="512" r="302" stroke="url(#ringGradient)" stroke-width="92" stroke-linecap="round"/>
    <circle cx="512" cy="512" r="302" stroke="url(#innerShade)" stroke-width="92" stroke-linecap="round"/>
  </g>
</svg>
