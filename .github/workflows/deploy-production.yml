name: 🚀 Deploy Production

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Commit SHA or Git ref that already passed staging
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: 🚀 Production Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
      GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_ref }}

      - name: Resolve release SHA
        id: release
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate Google auth configuration
        run: |
          has_wif=false
          has_json=false

          if [ -n "$GCP_WORKLOAD_IDENTITY_PROVIDER" ]; then
            has_wif=true
          fi

          if [ -n "$GCP_CREDENTIALS_JSON" ]; then
            has_json=true
          fi

          if $has_wif && $has_json; then
            echo "Configure exactly one auth mode: either production var GCP_WORKLOAD_IDENTITY_PROVIDER or production secret GCP_CREDENTIALS_JSON." >&2
            exit 1
          fi

          if ! $has_wif && ! $has_json; then
            echo "Missing Google auth config. Set production var GCP_WORKLOAD_IDENTITY_PROVIDER for Workload Identity or production secret GCP_CREDENTIALS_JSON for a service account key." >&2
            exit 1
          fi

          if $has_wif && [ -z "$GCP_SERVICE_ACCOUNT" ]; then
            echo "Missing production var GCP_SERVICE_ACCOUNT. It is required when using Workload Identity." >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud with Workload Identity
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_CREDENTIALS_JSON == '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud with credentials JSON
        if: ${{ env.GCP_CREDENTIALS_JSON != '' && env.GCP_WORKLOAD_IDENTITY_PROVIDER == '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_CREDENTIALS_JSON }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Submit production deployment build
        run: |
          image_name="${{ vars.GCP_API_IMAGE_NAME }}"
          migration_image_name="${{ vars.GCP_API_MIGRATION_IMAGE_NAME }}"
          smoke_path="${{ vars.GCP_SMOKE_PATH }}"

          if [ -z "$image_name" ]; then
            image_name=api
          fi

          if [ -z "$migration_image_name" ]; then
            migration_image_name=api-migrator
          fi

          if [ -z "$smoke_path" ]; then
            smoke_path=/health
          fi

          gcloud builds submit \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --config cloudbuild.yaml \
            --substitutions="_DEPLOY_ENV=production,_REGION=${{ vars.GCP_REGION }},_AR_REPOSITORY=${{ vars.GCP_ARTIFACT_REPOSITORY }},_IMAGE_NAME=${image_name},_MIGRATION_IMAGE_NAME=${migration_image_name},_IMAGE_TAG=${{ steps.release.outputs.sha }},_SERVICE_NAME=${{ vars.GCP_API_SERVICE_NAME }},_MIGRATION_JOB_NAME=${{ vars.GCP_API_MIGRATION_JOB_NAME }},_SMOKE_PATH=${smoke_path}" \
            .

      - name: Show deployed production service URL
        run: |
          gcloud run services describe "${{ vars.GCP_API_SERVICE_NAME }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --format='value(status.url)'
